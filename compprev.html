<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link rel="icon" href="data:">
<title>観光来訪者数 前年比</title>
</head><body>
<h1>観光来訪者数 前年比</h1>
<select id="selpref"></select>
<select id="selcity"></select>
<div id="chart"></div>

<style>
body {
  font-family: sans-serif;
}
#chart {
  width: 95vw;
}
select {
  font-size: 130%;
}
a {
  color: gray !important;
}
</style>

<script type="module">
import { JAPAN_PREF } from "https://js.sabae.cc/JAPAN_PREF.js";
import { LineChartSVG } from "https://code4fukui.github.io/svg-chart/LineChartSVG.js";
import { CSV } from "https://js.sabae.cc/CSV.js";
import { ArrayUtil } from "https://js.sabae.cc/ArrayUtil.js";

const urlc = "https://code4fukui.github.io/localgovjp/localgovjp-utf8.csv";
const cities = await CSV.fetchJSON(urlc);
cities.forEach(i => {
  i.cid = parseInt(i.cid);
  i.pid = parseInt(i.pid);
});
//console.log("cities", cities);

let idx = 1;
for (const pref of JAPAN_PREF) {
  const opt = document.createElement("option");
  opt.textContent = pref;
  opt.value = idx++;
  selpref.appendChild(opt);
}
const hash = parseInt(location.hash.substring(1) || "18"); // 福井県
selpref.value = hash < 100 ? hash : (hash / 1000) >> 0;

const url = "https://code4fukui.github.io/japan-kanko-stat/data/all.csv";
//const url = "https://code4fukui.github.io/japan-kanko-stat/data/2025.csv";
const data = await CSV.fetchJSON(url);
data.forEach((i) => {
  i.month = parseInt(i.month);
  i.lgcode = parseInt(i.lgcode);
  i.n = parseInt(i.n);
});
//console.log(data);

const govlist = ArrayUtil.toUnique(data.map(i => i.lgcode));
//console.log("govlist", govlist);

const updateCity = () => {
  const pref = parseInt(selpref.value)
  const citylist = govlist.filter(i => ((i / 1000) >> 0) == pref);
  selcity.innerHTML = "";
  const opt = document.createElement("option");
  opt.value = "";
  opt.textContent = "-";
  selcity.appendChild(opt);
  for (const city of citylist) {
    const opt = document.createElement("option");
    opt.value = city;
    opt.textContent = cities.find(i => i.cid == city).city;
    selcity.appendChild(opt);
  }
};

selpref.addEventListener("input", updateCity);
updateCity();
if (hash > 1000) {
  selcity.value = hash;
}

const show = () => {
  chart.innerHTML = "";

  const lgcode = selcity.value ? selcity.value : selpref.value;
  location.hash = "#" + lgcode;

  const data2 = data.filter(i => i.lgcode == lgcode);
  //console.log(lgcode, data2)
  const thisyear = new Date().getFullYear();
  const data3 = {};
  const cnv = (ar) => {
    //console.log("cnv", ar);
    ar.sort((a, b) => a.month - b.month);
    const res = {};
    ar.forEach(i => res[i.month % 100 + "月"] = i.n);
    return res;
  };
  const prevyear = thisyear - 1;
  const prevyear2 = thisyear - 2;
  data3[prevyear2] = cnv(data2.filter(i => i.month >= prevyear2 * 100 && i.month < prevyear * 100));
  data3[prevyear] = cnv(data2.filter(i => i.month >= prevyear * 100 && i.month < thisyear * 100));
  data3[thisyear] = cnv(data2.filter(i => i.month >= thisyear * 100));

  //console.log(data3);
  const colors = ["deepskyblue", "blue", "green", "orange", "red", "purple",];
  const linechart = new LineChartSVG({
    width: 1000,
    height: 500,
    data: data3,
    colors,
  });
  chart.appendChild(linechart);
};
show();
selpref.oninput = selcity.oninput = () => show();

</script>
